<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DropRoom - Private File Sharing</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="header">
        <div class="container">
            <h1 class="logo">DropRoom</h1>
        </div>
    </header>
    
    <main class="main">
        <div class="container">
            <div class="hero">
                <h2 class="hero-title">Share Files Privately</h2>
                <p class="hero-description">Create a secure room to share files with anyone, anywhere. The site uses Ai to analayze and share your files.
            
                </p>
                
                <div class="hero-buttons">
                    <button id="create-room-btn" class="btn-primary">
                        Create Room
                    </button>
                    <button id="saved-rooms-btn" class="btn-secondary">
                        Saved Rooms
                    </button>
                </div>
            </div>
        </div>
    </main>
    
    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 DropRoom. Simple, secure file sharing.</p>
        </div>
    </footer>
    
    <script src="script.js"></script>
</body>
</html>
